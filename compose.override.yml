name: fcp-fdm

services:
  fcp-fdm:
    ports:
      - '3000:3000'
    networks:
      - fcp-fdm

  mongodb:
    ports:
      - '27017:27017'
    networks:
      - fcp-fdm
    volumes:
      - mongodb-data:/data

  floci:
    ports:
      - '4566:4566'
    volumes:
      - floci-data:/app/data
    networks:
      - fcp-fdm

  floci-init:
    networks:
      - fcp-fdm

  fcp-fdm-event-publisher-stub:
    ports:
      - '3002:3002'
    networks:
      - fcp-fdm

networks:
  fcp-fdm:
    driver: bridge
    name: fcp-fdm

volumes:
  mongodb-data:
  floci-data:
